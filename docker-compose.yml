# shardd v2 — libp2p-only nodes plus HTTP gateway
#
# Every shardd binary hard-requires SHARDD_CLUSTER_KEY: it's the PSK for
# the private mesh AND the secret half of the libp2p identity derivation.
# The value below is a clearly-labeled insecure dev key — real deployments
# read a high-entropy key from infra/secrets/prod.env.
x-cluster-env: &cluster-env
  SHARDD_CLUSTER_KEY: local-dev-insecure-cluster-key-do-not-use-in-prod

services:
  db1:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db1_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  db2:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db2_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  db3:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db3_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  node1:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    environment:
      <<: *cluster-env
      DATABASE_URL: "postgres://shardd:shardd@db1/shardd"
    command: [--host=0.0.0.0, --libp2p-port=4001, --advertise-addr=/dns4/node1/tcp/4001, --database-url=postgres://shardd:shardd@db1/shardd]
    depends_on: { db1: { condition: service_healthy } }

  node2:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    environment:
      <<: *cluster-env
      DATABASE_URL: "postgres://shardd:shardd@db2/shardd"
    command: [--host=0.0.0.0, --libp2p-port=4002, --advertise-addr=/dns4/node2/tcp/4002, --database-url=postgres://shardd:shardd@db2/shardd, --bootstrap=/dns4/node1/tcp/4001]
    depends_on:
      db2: { condition: service_healthy }
      node1: { condition: service_started }

  node3:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    environment:
      <<: *cluster-env
      DATABASE_URL: "postgres://shardd:shardd@db3/shardd"
    command: [--host=0.0.0.0, --libp2p-port=4003, --advertise-addr=/dns4/node3/tcp/4003, --database-url=postgres://shardd:shardd@db3/shardd, --bootstrap=/dns4/node1/tcp/4001]
    depends_on:
      db3: { condition: service_healthy }
      node1: { condition: service_started }

  gateway:
    build: { context: ., dockerfile: apps/gateway/Dockerfile }
    ports: ["8080:8080"]
    environment:
      <<: *cluster-env
      SHARDD_PUBLIC_EDGE_ID: local
      SHARDD_PUBLIC_EDGE_REGION: local
      SHARDD_PUBLIC_BASE_URL: http://127.0.0.1:8080
      SHARDD_PUBLIC_EDGES_JSON: '[{"edge_id":"local","region":"local","base_url":"http://127.0.0.1:8080"}]'
    command: [--host=0.0.0.0, --port=8080, --bootstrap-peer=/dns4/node1/tcp/4001]
    depends_on:
      node1: { condition: service_started }
      node2: { condition: service_started }
      node3: { condition: service_started }

volumes:
  db1_data:
  db2_data:
  db3_data:
