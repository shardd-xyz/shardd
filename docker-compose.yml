# shardd v2 — per-node Postgres
services:
  db1:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db1_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  db2:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db2_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  db3:
    image: postgres:17-alpine
    environment: { POSTGRES_DB: shardd, POSTGRES_USER: shardd, POSTGRES_PASSWORD: shardd }
    volumes: [db3_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U shardd"], interval: 2s, retries: 10 }

  node1:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    ports: ["3001:3001"]
    environment: { DATABASE_URL: "postgres://shardd:shardd@db1/shardd" }
    command: [--port=3001, --advertise-addr=node1:3001, --bootstrap=node2:3002, --bootstrap=node3:3003]
    depends_on: { db1: { condition: service_healthy } }

  node2:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    ports: ["3002:3002"]
    environment: { DATABASE_URL: "postgres://shardd:shardd@db2/shardd" }
    command: [--port=3002, --advertise-addr=node2:3002, --bootstrap=node1:3001, --bootstrap=node3:3003]
    depends_on: { db2: { condition: service_healthy } }

  node3:
    build: { context: ., dockerfile: apps/node/Dockerfile }
    ports: ["3003:3003"]
    environment: { DATABASE_URL: "postgres://shardd:shardd@db3/shardd" }
    command: [--port=3003, --advertise-addr=node3:3003, --bootstrap=node1:3001, --bootstrap=node2:3002]
    depends_on: { db3: { condition: service_healthy } }

volumes:
  db1_data:
  db2_data:
  db3_data:
