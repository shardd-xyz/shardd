global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: shardd-edges
    scrape_interval: 10s
    scheme: https
    static_configs:
      - targets:
          - use1.api.shardd.xyz
          - euc1.api.shardd.xyz
          - ape1.api.shardd.xyz
    metrics_path: /metrics
