# Generated by infra/generate-compose.sh — do not edit by hand.
# Re-run the script with a different NODE_COUNT to resize the cluster.

x-pg-env: &pg-env
  POSTGRES_DB: shardd
  POSTGRES_USER: shardd
  POSTGRES_PASSWORD: shardd

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U shardd"]
  interval: 2s
  retries: 20

services:
  db-node1:
    image: postgres:17-alpine
    container_name: shardd-db-node1
    environment: *pg-env
    healthcheck: *pg-healthcheck
    volumes:
      - node1_db:/var/lib/postgresql/data
    networks: [shardnet]
    restart: unless-stopped

  db-node2:
    image: postgres:17-alpine
    container_name: shardd-db-node2
    environment: *pg-env
    healthcheck: *pg-healthcheck
    volumes:
      - node2_db:/var/lib/postgresql/data
    networks: [shardnet]
    restart: unless-stopped

  db-node3:
    image: postgres:17-alpine
    container_name: shardd-db-node3
    environment: *pg-env
    healthcheck: *pg-healthcheck
    volumes:
      - node3_db:/var/lib/postgresql/data
    networks: [shardnet]
    restart: unless-stopped

  node1:
    image: shardd-node:latest
    container_name: shardd-node1
    command:
      - --host=0.0.0.0
      - --libp2p-port=4001
      - --advertise-addr=/dns4/shardd-node1/tcp/4001
      - --database-url=postgres://shardd:shardd@db-node1/shardd
    depends_on:
      db-node1: { condition: service_healthy }
    networks: [shardnet]
    restart: unless-stopped

  node2:
    image: shardd-node:latest
    container_name: shardd-node2
    command:
      - --host=0.0.0.0
      - --libp2p-port=4002
      - --advertise-addr=/dns4/shardd-node2/tcp/4002
      - --database-url=postgres://shardd:shardd@db-node2/shardd
      - --bootstrap=/dns4/shardd-node1/tcp/4001
    depends_on:
      db-node2: { condition: service_healthy }
      node1: { condition: service_started }
    networks: [shardnet]
    restart: unless-stopped

  node3:
    image: shardd-node:latest
    container_name: shardd-node3
    command:
      - --host=0.0.0.0
      - --libp2p-port=4003
      - --advertise-addr=/dns4/shardd-node3/tcp/4003
      - --database-url=postgres://shardd:shardd@db-node3/shardd
      - --bootstrap=/dns4/shardd-node1/tcp/4001
    depends_on:
      db-node3: { condition: service_healthy }
      node1: { condition: service_started }
    networks: [shardnet]
    restart: unless-stopped

  gateway:
    image: shardd-gateway:latest
    container_name: shardd-gateway
    command:
      - --host=0.0.0.0
      - --port=8080
      - --bootstrap-peer=/dns4/shardd-node1/tcp/4001
    depends_on:
      node1: { condition: service_started }
      node2: { condition: service_started }
      node3: { condition: service_started }
    networks: [shardnet]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: shardd-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway: { condition: service_started }
    networks: [shardnet]
    restart: unless-stopped

networks:
  shardnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  node1_db:
  node2_db:
  node3_db:
