name: sdk-python-publish

# Fires when `./run sdk:publish:python <version>` creates and pushes a
# tag of the form `sdk-py-v<version>`. Builds sdist + wheel, validates
# with twine, then uploads to PyPI using PYPI_API_TOKEN.

on:
  push:
    tags:
      - "sdk-py-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m build
      - run: twine check dist/*
      - name: twine upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
