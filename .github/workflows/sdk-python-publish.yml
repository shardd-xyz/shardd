name: sdk-python-publish

# Publishing is done from the operator machine via `./run
# sdk:publish:python <version>`. This workflow is manual-only to avoid
# accidental registry publishes from GitHub Actions.

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m build
      - run: twine check dist/*
      - name: twine upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
