name: sdk-ci

# Runs on every push/PR that touches an SDK. No publishing happens in
# CI; SDK release uploads are done from the operator machine via
# `./run sdk:publish:*`.

on:
  push:
    branches: [main]
    paths:
      - "sdks/**"
      - ".github/workflows/sdk-*.yml"
  pull_request:
    paths:
      - "sdks/**"
      - ".github/workflows/sdk-*.yml"
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test
      - name: cargo publish --dry-run
        run: cargo publish --dry-run

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: npm pack (dry run)
        run: npm pack --dry-run

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
      - run: python -m build
      - run: twine check dist/*

  kotlin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - run: ./gradlew --no-daemon test publishToMavenLocal

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/developer-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/developer-cli
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test
      - name: cargo publish --dry-run
        run: cargo publish --dry-run
