name: sdk-ts-publish

# Fires when `./run sdk:publish:ts <version>` creates and pushes a tag
# of the form `sdk-ts-v<version>`. Builds, tests, then publishes to
# npm using NPM_TOKEN. Uses provenance for a verifiable supply-chain
# attestation (requires npm >= 9 and `id-token: write` permission).

on:
  push:
    tags:
      - "sdk-ts-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
